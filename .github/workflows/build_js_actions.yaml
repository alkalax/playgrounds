name: Build JS custom actions

on:
  push:
    branches-ignore:
      - main
    paths:
      - '.github/actions/**' 
      - '!.github/actions/**/dist/**'# Prevent triggering a commit loop

jobs:
  build:
    runs-on: [self-hosted]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - name: Build
        working-directory: '.github/actions/boot-azure-vm'
        run: |
          npm ci
          npm run build

      - name: Commit and Push
        working-directory: '.github/actions'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"

          git add boot-azure-vm/dist/index.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Build js-action" && git push)
