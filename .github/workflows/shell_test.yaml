name: Shell Test
on:
  push:
    branches:
      - feature/workflow-shell-test

jobs:
  shell-test:
    runs-on: [ self-hosted ]

    steps:
      - name: Python
        shell: python
        run: |
          import platform
          print(f"Running on {platform.system()}")

      - name: Node
        shell: node {0}
        run: |
          console.log("Current directory:", process.cwd())
