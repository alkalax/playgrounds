{{define "base"}}

<html>

      <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
    <h1 class="text-xl font-bold mb-4">{{.Heading}}</h1>
    {{template "content" .}}
    </div>
  </body>
</html>
